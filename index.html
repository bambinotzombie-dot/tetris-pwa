<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>Tetris (Mobile Canvas)</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title">TETRIS</div>
        <div class="stats">
          <div class="stat"><span class="label">SCORE</span><span id="score" class="value">0</span></div>
          <div class="stat"><span class="label">LINES</span><span id="lines" class="value">0</span></div>
          <div class="stat"><span class="label">LEVEL</span><span id="level" class="value">1</span></div>
        </div>
        <div class="actions">
          <button id="btnPause" class="chip" type="button">一時停止</button>
          <button id="btnRestart" class="chip" type="button">リスタート</button>
        </div>
      </header>

      <section class="play">
        <div class="stageWrap">
          <canvas id="game" width="360" height="720" aria-label="テトリスゲーム画面"></canvas>
          <div id="overlay" class="overlay hidden" aria-live="polite"></div>
        </div>
      </section>

      <!-- 画面の下半分：操作ボタン -->
      <section class="controls" aria-label="操作ボタン">
        <div class="controlsPad">
          <!-- 左手側：十字キー -->
          <div class="dpad" aria-label="十字キー">
            <button id="btnUp" class="padBtn padBtn--up" type="button" aria-label="上（ハードドロップ）">▲</button>
            <button id="btnLeft" class="padBtn padBtn--left" type="button" aria-label="左移動">◀</button>
            <button id="btnRight" class="padBtn padBtn--right" type="button" aria-label="右移動">▶</button>
            <button id="btnDown" class="padBtn padBtn--down" type="button" aria-label="下（ソフトドロップ）">▼</button>
            <div class="dpadCore" aria-hidden="true"></div>
          </div>

          <!-- 右手側：回転ボタン -->
          <div class="actionPad" aria-label="アクション">
            <button id="btnRotate" class="actionBtn" type="button" aria-label="回転">回転</button>
          </div>
        </div>
        <div class="hint">
          <span>Tips: 十字キー（上=ハード/下=ソフト）＋回転。キーボード(←→↑Space/P)も対応</span>
        </div>
      </section>
    </main>

    <script src="./script.js?v=2"></script>
  </body>
</html>
